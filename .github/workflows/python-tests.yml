name: Reference kit tests

on:
  pull_request:
  push:

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run Python reference checks
        run: python scripts/check.py --python-only

  ergo-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b  # v1.2.1
      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile ErgoScript contracts with AppKit
        run: python scripts/check.py --sbt-only
