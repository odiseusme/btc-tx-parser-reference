name: Reference kit tests

on:
  pull_request:
  push:

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run Python reference checks
        run: python scripts/check.py --python-only

  ergo-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: sbt/setup-sbt@v1
      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile ErgoScript contracts with AppKit
        run: python scripts/check.py --sbt-only
